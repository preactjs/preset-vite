name: Release

on:
  push:
    branches:
      - main

jobs:
  release:
    name: Release
    outputs:
      has_changesets: ${{ steps.changesets.outputs.hasChangesets }}
      should_publish: ${{ steps.publish-check.outputs.should_publish }}
    permissions:
      contents: write
      issues: read
      pull-requests: write
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: package.json
          cache: npm
          cache-dependency-path: package-lock.json
          registry-url: "https://registry.npmjs.org"

      - name: Update npm
        run: npm install -g npm@11.11

      - name: Install dependencies
        run: npm ci

      - name: Create Release Pull Request
        id: changesets
        uses: changesets/action@v1
        with:
          version: npm run version
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Check whether this version still needs publishing
        if: steps.changesets.outputs.hasChangesets == 'false'
        id: publish-check
        shell: bash
        run: |
          PACKAGE_NAME=$(node -p "require('./package.json').name")
          PACKAGE_VERSION=$(node -p "require('./package.json').version")

          echo "Checking whether ${PACKAGE_NAME}@${PACKAGE_VERSION} is already on npm"
          if npm view "${PACKAGE_NAME}@${PACKAGE_VERSION}" version >/dev/null 2>&1; then
            echo "should_publish=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "should_publish=true" >> "$GITHUB_OUTPUT"

  publish:
    name: Publish
    needs: release
    if: needs.release.outputs.should_publish == 'true'
    environment:
      name: npm
      url: https://www.npmjs.com/package/@preact/preset-vite
    permissions:
      contents: write
      id-token: write
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: package.json
          cache: npm
          cache-dependency-path: package-lock.json
          registry-url: "https://registry.npmjs.org"

      - name: Update npm
        run: npm install -g npm@11.11

      - name: Install dependencies
        run: npm ci

      - name: Publish packages
        uses: changesets/action@v1
        with:
          publish: npx changeset publish
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
